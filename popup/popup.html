<!DOCTYPE html>
<html>
<head>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 300px;
            padding: 24px 20px 20px;
            font-family: 'DM Sans', sans-serif;
            background: #0e0e10;
            color: #e8e8ec;
            min-height: 260px;
            position: relative;
        }

        .header {
            margin-bottom: 20px;
            padding-right: 90px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(74, 222, 128, 0.1);
            border: 1px solid rgba(74, 222, 128, 0.25);
            color: #4ade80;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .badge::before {
            content: '';
            width: 5px;
            height: 5px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        h3 {
            font-size: 15px;
            font-weight: 600;
            color: #f1f1f4;
            line-height: 1.4;
            letter-spacing: -0.01em;
        }

        .subtitle {
            font-size: 11px;
            color: #e8a010;
            margin-top: 4px;
        }

        /* Hidden real checkbox - must be BEFORE toggle-corner in DOM */
        #autoRun { display: none; }

        /* Toggle sits absolute top-right */
        .toggle-corner {
            position: absolute;
            top: 24px;
            right: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }

        .toggle-corner-label {
            font-size: 9px;
            color: #6b6b78;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.3;
        }

        .toggle-track {
            width: 36px;
            height: 20px;
            background: #2a2a35;
            border-radius: 20px;
            position: relative;
            transition: background 0.2s;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            background: #555566;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.2s, background 0.2s;
        }

        /* CSS sibling selector: checkbox -> label.toggle-corner -> track */
        #autoRun:checked ~ .toggle-corner .toggle-track {
            background: rgba(74, 222, 128, 0.2);
        }

        #autoRun:checked ~ .toggle-corner .toggle-track::after {
            background: #4ade80;
            transform: translateX(16px);
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 16px 0;
        }

        .inline-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .inline-label {
            font-size: 12px;
            color: #9999b0;
            font-weight: 400;
        }

        input[type="number"] {
            width: 48px;
            padding: 3px 6px;
            background: #1a1a1f;
            border: 1px solid #2a2a35;
            border-radius: 6px;
            color: #4ade80;
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            text-align: center;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus { border-color: #4ade80; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { display: none; }

        .applied-num {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: #4ade80;
        }

        button {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: #4ade80;
            color: #0a1a0f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.01em;
            transition: all 0.15s ease;
        }

        button:hover {
            background: #22c55e;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.25);
        }

        button:active {
            transform: translateY(0);
            box-shadow: none;
        }
    </style>
</head>
<body>

<!--
    #autoRun MUST be the first element in <body> so the CSS
    general sibling combinator (~) can reach .toggle-corner
-->
<input type="checkbox" id="autoRun"/>

<div class="header">
    <div class="badge">InstaHyre Auto-Apply</div>
    <h3>Job Auto-Applier</h3>
    <p class="subtitle">Update your profile first</p>
</div>

<label class="toggle-corner" for="autoRun">
    <span class="toggle-corner-label">Auto Run<br>on Load</span>
    <div class="toggle-track"></div>
</label>

<div class="divider"></div>

<div class="inline-row">
    <span class="inline-label">Number of jobs to apply</span>
    <input type="number" id="jobCount" value="10" min="1" max="50"/>
</div>

<div class="inline-row" style="border-bottom:none;">
    <span class="inline-label">Applied so far</span>
    <span class="applied-num" id="counter">0</span>
</div>

<button id="applyBtn">Apply Now</button>

<script src="popup.js"></script>
</body>
</html>
